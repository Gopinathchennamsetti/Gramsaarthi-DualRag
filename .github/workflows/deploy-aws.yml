name: Deploy to AWS

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      S3_BUCKET: ${{ secrets.S3_BUCKET }}
      CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate frontend deploy secrets
        run: |
          test -n "$AWS_ACCESS_KEY_ID" || (echo "Missing secret: AWS_ACCESS_KEY_ID" && exit 1)
          test -n "$AWS_SECRET_ACCESS_KEY" || (echo "Missing secret: AWS_SECRET_ACCESS_KEY" && exit 1)
          test -n "$S3_BUCKET" || (echo "Missing secret: S3_BUCKET" && exit 1)
          test -n "$CLOUDFRONT_DISTRIBUTION_ID" || (echo "Missing secret: CLOUDFRONT_DISTRIBUTION_ID" && exit 1)

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install and build
        run: |
          npm ci
          npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Upload to S3
        run: |
          BUCKET="$(echo -n "$S3_BUCKET" | tr -d '\r\n')"
          aws s3 sync dist/ "s3://${BUCKET}" --delete

      - name: Invalidate CloudFront
        run: |
          DIST_ID="$(echo -n "$CLOUDFRONT_DISTRIBUTION_ID" | tr -d '\r\n')"
          aws cloudfront create-invalidation --distribution-id "$DIST_ID" --paths "/*"

  deploy-backend:
    runs-on: ubuntu-latest
    needs: deploy-frontend
    env:
      EC2_HOST: ${{ secrets.EC2_HOST }}
      EC2_SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate backend deploy secrets
        run: |
          test -n "$EC2_HOST" || (echo "Missing secret: EC2_HOST" && exit 1)
          test -n "$EC2_SSH_PRIVATE_KEY" || (echo "Missing secret: EC2_SSH_PRIVATE_KEY" && exit 1)

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script: |
            set -e
            if [ ! -d /opt/dualrag_app_web/.git ]; then
              echo "Repository not bootstrapped on EC2. Run deploy/aws/bootstrap-ec2.sh first."
              exit 1
            fi
            cd /opt/dualrag_app_web
            git fetch origin main
            git checkout main
            git pull origin main
            source .venv/bin/activate
            pip install -r backend/requirements.txt -r backend/requirements_pipeline.txt
            sudo systemctl restart dualrag-backend
            sudo systemctl is-active dualrag-backend
